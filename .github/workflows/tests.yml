name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - laravel: "8.*"
            testbench: "^6.0"
            php: "8.1"
          - laravel: "9.*"
            testbench: "^7.0"
            php: "8.1"
          - laravel: "10.*"
            testbench: "^8.0"
            php: "8.1"
          - laravel: "11.*"
            testbench: "^9.0"
            php: "8.2"
          - laravel: "12.*"
            testbench: "^10.0"
            php: "8.2"
          - laravel: "13.*"
            testbench: "^11.0"
            php: "8.3"

    name: Laravel ${{ matrix.laravel }} / PHP ${{ matrix.php }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Validate composer.json and composer.lock
        run: composer validate --strict --no-check-lock

      - name: Install dependencies for matrix
        run: >
          composer update --prefer-dist --no-interaction
          --with "laravel/framework:${{ matrix.laravel }}"
          --with "orchestra/testbench:${{ matrix.testbench }}"

      - name: Run tests
        run: vendor/bin/phpunit
